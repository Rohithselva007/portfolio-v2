<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ post.title }} — SelvaRohith</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#111118;--surface-2:#1a1a24;--border:rgba(255,255,255,.07);--text:#f0efe9;--muted:#6b6b80;--accent:#7f77dd;--accent-dim:#26215C;--accent-bright:#AFA9EC;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;min-height:100vh;}
    nav{position:sticky;top:0;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(12px);z-index:10;}
    .nav-logo{font-size:13px;font-weight:500;letter-spacing:.14em;color:var(--accent);text-decoration:none;}
    .nav-back{font-size:13px;color:var(--muted);text-decoration:none;}
    .nav-back:hover{color:var(--text);}
    .article{max-width:680px;margin:0 auto;padding:4rem 2rem;}
    .article-meta{display:flex;gap:12px;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
    .meta-date{font-size:12px;color:var(--muted);}
    .meta-read{font-size:12px;color:var(--accent);}
    .meta-views{font-size:12px;color:var(--muted);}
    .article h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:500;line-height:1.25;margin-bottom:1.5rem;}
    .article-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:3rem;padding-bottom:2rem;border-bottom:.5px solid var(--border);}
    .article-tag{font-size:12px;color:var(--muted);background:var(--surface);border:.5px solid var(--border);padding:3px 10px;border-radius:999px;}
    .article-body{font-size:16px;color:rgba(240,239,233,.85);line-height:1.85;}
    .article-body h2{font-size:22px;font-weight:500;margin:2.5rem 0 1rem;color:var(--text);}
    .article-body h3{font-size:18px;font-weight:500;margin:2rem 0 .75rem;color:var(--text);}
    .article-body p{margin-bottom:1.25rem;}
    .article-body code{background:var(--surface);border:.5px solid var(--border);border-radius:4px;padding:2px 6px;font-size:14px;font-family:monospace;}
    .article-body pre{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:1.5rem;overflow-x:auto;margin-bottom:1.5rem;}
    .article-body pre code{background:none;border:none;padding:0;}
    .article-body a{color:var(--accent-bright);}
    .article-body ul,ol{padding-left:1.5rem;margin-bottom:1.25rem;}
    .article-body li{margin-bottom:.5rem;}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;margin-top:4rem;padding-top:2rem;border-top:.5px solid var(--border);width:100%;}
    .back-link:hover{color:var(--text);}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">SR</a>
  <a href="{% url 'blog_list' %}" class="nav-back">← All posts</a>
</nav>
<article class="article">
  <div class="article-meta">
    <span class="meta-date">{{ post.created_at|date:"M d, Y" }}</span>
    <span class="meta-read">{{ post.read_time }}</span>
    <span class="meta-views">{{ post.view_count }} views</span>
  </div>
  <h1>{{ post.title }}</h1>
  {% if post.tag_list %}
  <div class="article-tags">{% for tag in post.tag_list %}<span class="article-tag">{{ tag }}</span>{% endfor %}</div>
  {% endif %}
  <div class="article-body">{{ post.content|safe }}</div>
  <a href="{% url 'blog_list' %}" class="back-link">← Back to all posts</a>
</article>
</body>
</html>
